<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro</title>

<link rel="stylesheet" href="css/login.css">
<link rel="icon" type="image/x-icon" href="assets/fav32x32.png">

</head>
<body>

<div class="container">

    <!-- METADE ESQUERDA -->
    <div class="left">
        <img src="assets/piloto.jpg" alt="">
    </div>

    <!-- METADE DIREITA -->
    <div class="right">

        <img src="assets/logo.svg" class="logo" alt="">

        <h2 class="titulo-cadastro">
            Cadastro Administrativo
        </h2>

        <!-- TIPO DE CADASTRO -->
        <select id="tipoUsuario">
            <option value="">Selecione o tipo de cadastro</option>
            <option value="aluno">Cadastro de Aluno</option>
            <option value="instrutor">Cadastro de Instrutor</option>
        </select>

        <!-- DADOS PESSOAIS -->
        <div class="grupo-cadastro">

            <!-- NOME -->
            <input
                type="text"
                id="nome"
                placeholder="Nome"
            >

            <!-- SOBRENOME -->
            <input
                type="text"
                id="sobrenome"
                placeholder="Sobrenome"
            >

            <!-- CPF E RG -->
            <div class="linha">
                <input
                    type="text"
                    id="cpf"
                    placeholder="CPF"
                >

                <input
                    type="text"
                    id="rg"
                    placeholder="RG"
                >
            </div>

            <!-- EMAIL -->
            <input
                type="email"
                id="emailCadastro"
                placeholder="E-mail"
            >

            <!-- TELEFONE E SENHA -->
            <div class="linha">
                <input
                    type="text"
                    id="telefone"
                    placeholder="Telefone / WhatsApp"
                >

                <input
                    type="password"
                    id="senhaCadastro"
                    placeholder="Senha"
                >
            </div>

        </div>

        <!-- CAMPOS EXTRAS -->
        <div id="camposExtras"></div>

        <!-- BOTÃO -->
        <button onclick="cadastrar()">
            Cadastrar
        </button>

        <p>
            Já tem conta?
            <a href="login.html">Entrar</a>
        </p>

    </div>

</div>

<script src="js/script.js"></script>

</body>
</html>
